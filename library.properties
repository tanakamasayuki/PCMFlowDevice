name=PCMFlowDevice
version=0.1.0
author=TANAKA Masayuki
maintainer=TANAKA Masayuki
sentence=Device I/O helpers for PCMFlow, starting with buffered M5Unified speaker playback.
paragraph=Provides device-specific helpers that bridge PCMFlow audio to hardware APIs. The initial release includes M5SpeakerBufferedPlayer, which owns rotating PCM buffers for M5Unified Speaker.playRaw(), applies initial prebuffer and playback chunk profiles, retries when the speaker queue is full, and exposes application-side diagnostics. Transport and codec logic stay in PCMFlowUDP and codec sibling libraries.
category=Signal Input/Output
url=https://github.com/tanakamasayuki/PCMFlowDevice
architectures=*
depends=PCMFlow, M5Unified
includes=PCMFlowDevice.h
